name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm run build

      - name: Get Version
        id: get_version
        uses: dhkatz/get-version-action@v3.0.0

      - name: Substitute manifest download links for versioned ones
        run: |
          jq '.version = "${{ steps.get_version.outputs.version-without-v }}" |
              .url = "https://github.com/${{ github.repository }}" |
              .manifest = "https://github.com/${{ github.repository }}/releases/latest/download/module.json" |
              .download = "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.zip" |
              .flags.hotReload = false' dist/module.json > module.json
          mv module.json dist/module.json

      - name: Zip
        run: zip -q module.zip -r dist

      - name: Update Release with Artifacts
        uses: ncipollo/release-action@v1.13.0
        with:
          allowUpdates: true
          name: ${{ github.event.release.name }}
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
          artifacts: "./module.zip, ./dist/module.json"
          token: ${{ secrets.GITHUB_TOKEN }}

defaults:
  run:
    shell: bash
